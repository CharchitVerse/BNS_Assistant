# ============================================================================
# BNS Legal RAG — CI/CD Pipeline
# Lint → Test → Eval Gate → Docker Build → Deploy
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check app/ frontend/ scripts/ tests/

      - name: Check formatting
        run: ruff format --check app/ frontend/ scripts/ tests/

  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: bns_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/bns_test
          DATABASE_URL_SYNC: postgresql://test_user:test_pass@localhost:5432/bns_test
          GROQ_API_KEY: test_key
          GEMINI_API_KEY: test_key
          APP_ENV: test
        run: pytest tests/ -v --tb=short

  # ── Eval Gate ────────────────────────────────────────────────────────────
  eval:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run eval suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Running RAGAS evaluation suite..."
          python tests/eval_suite.py
          echo "Eval gate passed ✅"

  # ── Docker Build ─────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: eval
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bns-legal-rag:latest .

      - name: Test Docker image
        run: |
          docker run --rm bns-legal-rag:latest python -c "from app.api.main import app; print('✅ Import successful')"

  # ── Deploy (Render) ─────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Deploy triggered ✅"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK not set, skipping deploy"
          fi
